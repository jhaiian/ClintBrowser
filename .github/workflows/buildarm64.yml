name: Build Clint Browser ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fL "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant Execute Permission for gradlew
        run: chmod +x gradlew

      - name: Decode Signing Keystore
        run: |
          printf '%s' "${{ secrets.BASE_64_SIGNING_KEY }}" | tr -d '\n' | base64 -d > app/release_keystore.jks

      - name: Create local.properties
        run: printf '%s\n' "${{ secrets.LOCAL_PROPERTIES }}" > local.properties

      - name: Build GitHub Release APKs
        run: ./gradlew assembleGithubRelease

      - name: List generated APKs
        run: find app/build/outputs/apk/github/release -name "*.apk" | sort

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: Clint-arm64-v8a
          path: app/build/outputs/apk/github/release/app-github-arm64-v8a-release.apk
          if-no-files-found: error
          